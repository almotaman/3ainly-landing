<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ainly Landing</title>
    <style>
        :root {
            --footer-button-height: 60px; /* Adjust this value as needed for the footer button height */
            --tour-container-height: calc(100vh - var(--footer-button-height));
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--footer-button-height);
            background-color: #fff;
            text-align: center;
        }
        #whatsAppBtn {
            /* Add your button styles here */
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="tour-container">
        <!-- Tour content goes here, adjusted for footer height -->
    </div>
    <div class="footer">
        <button id="whatsAppBtn">WhatsApp</button>
    </div>
</body>
</html>
