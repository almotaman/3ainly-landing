<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #f8f8f8;
            padding: 20px;
            text-align: center;
        }
        .tour-container {
            height: calc(100vh - 150px); /* Adjust based on header and footer height */
        }
        .footer {
            background-color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .whatsapp-button {
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 50%;
            padding: 10px 15px;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Landing Page</h1>
    </header>
    <div class="tour-container">
        <iframe src="https://kuula.co/share/collection/7Mqjy?logo=1&info=1&fs=1&vr=0&sd=1&gyro=0&thumbs=-1" 
                width="100%" 
                height="100%" 
                style="border: 0;">
        </iframe>
    </div>
    <div class="unlock-overlay">
        <form onsubmit="unlock()">
            <input type="text" placeholder="Enter to Unlock" required>
            <button type="submit">Unlock</button>
        </form>
    </div>
    <div class="footer">
        <button class="whatsapp-button" onclick="window.open('https://api.whatsapp.com/send?phone=201035572531', '_blank')">📞</button>
    </div>
    <script>
        function unlock() {
            alert('Unlocked!');
            // Add your logic here to handle the unlock
        }
    </script>
</body>
</html>
