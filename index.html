<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Tour Access</title>

  <!-- Meta Pixel (safe if not configured yet) -->
  <script>
    (function (f, b, e, v, n, t, s) {
      if (f.fbq) return;
      n = f.fbq = function () {
        n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
      };
      if (!f._fbq) f._fbq = n;
      n.push = n.loaded = !0;
      n.version = '2.0';
      n.queue = [];
      t = b.createElement(e);
      t.async = !0;
      t.src = v;
      s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s);
    })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    // If you haven't set a Pixel ID yet, leave PIXEL_ID empty and events will be skipped.
    const PIXEL_ID = '';
    if (PIXEL_ID) {
      fbq('init', PIXEL_ID);
      fbq('track', 'PageView');
    }
  </script>

  <style>
    :root {
      --bar-bg: rgba(0, 0, 0, 0.72);
      --panel-bg: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #fff;
      --accent: #22c55e;
      --accent-text: #06210f;
      --bar-height: 120px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #000;
      color: var(--text);
    }

    /* Layout: header + CTA strip, then the tour takes the rest of the viewport */
    .top {
      position: relative;
      z-index: 10;
      width: 100%;
      background: var(--bar-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .headline {
      width: min(980px, 96vw);
      text-align: center;
    }

    .headline h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0.2px;
      font-weight: 800;
    }

    .headline p {
      margin: 6px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .cta {
      width: min(980px, 96vw);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      backdrop-filter: blur(8px);
    }

    .cta input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      outline: none;
    }

    .cta input::placeholder { color: rgba(255, 255, 255, 0.65); }

    .cta button {
      padding: 10px 14px;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }

    #viewTourBtn {
      background: var(--accent);
      color: var(--accent-text);
    }

    #whatsAppBtn {
      background: #111827;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    #hint {
      width: min(980px, 96vw);
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
      margin-top: 2px;
    }

    /* Tour takes remaining space */
    #tour-container {
      width: 100%;
      height: calc(100vh - var(--bar-height));
      min-height: 360px;
    }

    /* Make top bar height adapt and keep iframe full remaining height */
    @media (max-width: 900px) {
      :root { --bar-height: 190px; }
      .cta {
        grid-template-columns: 1fr;
      }
      .cta button { width: 100%; }
    }

    #tour {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      filter: blur(12px);
      transform: scale(1.02);
    }

    .unlocked #tour {
      filter: none;
      transform: none;
    }

    .unlocked .top {
      background: rgba(0, 0, 0, 0.55);
    }

    .unlocked .cta {
      opacity: 0.85;
    }

    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div class="top">
    <div class="headline">
      <h1>Unlock Full 3D Tour</h1>
      <p>Fill your info, then click <strong>See Tour</strong> to view the full interactive experience.</p>
    </div>

    <div class="cta" id="cta">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="tel" id="phone" placeholder="Phone Number" required />
      <input type="text" id="revenue" placeholder="Monthly Revenue (optional)" />
      <button id="viewTourBtn" type="button">See Tour</button>
      <button id="whatsAppBtn" type="button">WhatsApp</button>
    </div>

    <div id="hint"></div>
  </div>

  <div id="tour-container">
    <iframe id="tour" src="about:blank" title="3D Tour"></iframe>
  </div>

  <script>
    // CONFIG
    const KUULA_EMBED_LINK = 'https://kuula.co/share/collection/7Mqjy?logo=1&info=1&fs=1&vr=0&sd=1&gyro=0&thumbs=-1';
    const N8N_WEBHOOK_URL = ''; // optional
    const WHATSAPP_NUMBER = '201035572531';

    const iframe = document.getElementById('tour');
    const hint = document.getElementById('hint');

    if (KUULA_EMBED_LINK) {
      iframe.src = KUULA_EMBED_LINK;
      hint.textContent = '';
    } else {
      hint.textContent = 'Admin note: KUULA_EMBED_LINK is not set yet. The tour iframe will be blank until you add it.';
    }

    function safeFbqTrack(eventName) {
      try {
        if (typeof window.fbq === 'function') {
          window.fbq('track', eventName);
        }
      } catch (e) {
        // ignore
      }
    }

    async function unlockTour() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const revenue = document.getElementById('revenue').value.trim();

      if (!name || !phone) {
        alert('Enter name and phone');
        return;
      }

      safeFbqTrack('Lead');

      if (N8N_WEBHOOK_URL) {
        try {
          await fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, revenue }),
          });
        } catch (e) {
          console.error(e);
        }
      }

      // Unlock: remove blur and keep CTA small at top
      document.body.classList.add('unlocked');
    }

    function goWhatsApp() {
      window.open(`https://wa.me/${WHATSAPP_NUMBER}`, '_blank');
    }

    document.getElementById('viewTourBtn').addEventListener('click', unlockTour);
    document.getElementById('whatsAppBtn').addEventListener('click', goWhatsApp);

    // Better mobile viewport height behavior
    function setVh() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }
    window.addEventListener('resize', setVh);
    setVh();
  </script>
</body>
</html>
